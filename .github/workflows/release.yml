name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: |
          cd target/release
          mv sovereign.exe sovereign-kernel-${{ matrix.os }}.exe
          Compress-Archive -Path sovereign-kernel-${{ matrix.os }}.exe -DestinationPath ../../sovereign-kernel-${{ matrix.os }}.zip

      - name: Package Linux/Mac
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/release
          mv sovereign sovereign-kernel-${{ matrix.os }}
          tar -czvf ../../sovereign-kernel-${{ matrix.os }}.tar.gz sovereign-kernel-${{ matrix.os }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sovereign-kernel-${{ matrix.os }}.zip
            sovereign-kernel-${{ matrix.os }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
