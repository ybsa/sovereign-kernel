services:
  sovereign-kernel:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovereign-kernel:latest
    container_name: sovereign-kernel-daemon
    restart: unless-stopped
    ports:
      # API Bridge (REST/gRPC)
      - "50051:50051"
    environment:
      - RUST_LOG=info
      # Add your API keys here or use an env_file:
      # - OPENAI_API_KEY=...
      # - ANTHROPIC_API_KEY=...
    env_file:
      - .env
    volumes:
      # Persist configuration and memory database
      - sovereign_data:/home/sovereign/.sovereign-kernel

volumes:
  sovereign_data:
    name: sovereign-kernel-data
    driver: local
