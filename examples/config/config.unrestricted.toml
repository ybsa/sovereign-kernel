# Sovereign Kernel - Unrestricted Configuration
# High power, full host access.

# WARNING: Use with caution. This mode allows the agent to execute any command 
# and modify any file without approval.

execution_mode = "unrestricted"
log_level = "debug"

[exec_policy]
mode = "full"

[approval]
# No automatic approval required for local automation
require_approval = []

[[mcp_servers]]
# Example Model Context Protocol (MCP) server integration
name = "sqlite"
timeout_secs = 30
env = []

[mcp_servers.transport]
type = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sqlite", "--", "./data.db"]
