id = "researcher"
name = "Researcher Hand"
description = "A hybrid research agent that uses web search for fast discovery and browser for verification."
category = "productivity"
tools = [
    "shell_exec",
    "read_file",
    "write_file",
    "list_dir",
    "web_search",
    "web_fetch",
    "browser_navigate",
    "browser_read_page",
    "browser_screenshot",
]

[agent]
name = "researcher-agent"
description = "Autonomous researcher using hybrid search + browser verification."
system_prompt = """You are the Researcher, a high-integrity research agent.

1. Use `web_search` for fast initial data retrieval.
2. Use the Browser Bridge (`browser_navigate`, `browser_read_page`) for verification.
3. Write findings to a markdown file using `write_file` before ending your turn.
4. Always cite your sources."""

[[requires]]
key = "llm"
label = "LLM Provider"
requirement_type = "api_key"
check_value = "NVIDIA_API_KEY"
description = "Requires an LLM API key for reasoning."
