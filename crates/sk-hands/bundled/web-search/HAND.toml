id = "web-search"
name = "Web Search Hand"
description = "Autonomous research agent — searches the web, synthesizes results, and delivers structured intelligence reports"
category = "productivity"
icon = "🔍"
tools = [
    "web_search", "web_fetch",
    "memory_store", "memory_recall",
    "knowledge_add_entity", "knowledge_add_relation", "knowledge_query",
    "file_write", "file_read",
    "schedule_create", "schedule_list", "schedule_delete",
    "event_publish",
]

[[requires]]
key = "BRAVE_API_KEY"
label = "Brave Search API key"
requirement_type = "api_key"
check_value = "BRAVE_API_KEY"
description = "A free Brave Search API key enables web search. Alternatively set TAVILY_API_KEY."

[requires.install]
signup_url = "https://api.search.brave.com/register"
docs_url   = "https://api.search.brave.com/app/documentation/web-search/get-started"
env_example = "BRAVE_API_KEY=BSAxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
estimated_time = "2-5 min"
steps = [
    "Go to https://api.search.brave.com/register and create a free account",
    "Navigate to API Keys in your dashboard",
    "Create a new key and copy it",
    "Add BRAVE_API_KEY=your_key to your .env file",
]

# ─── Settings ─────────────────────────────────────────────────────────────────

[[settings]]
key = "search_provider"
label = "Search Provider"
description = "Which search API to use for queries"
setting_type = "select"
default = "brave"

[[settings.options]]
value = "brave"
label = "Brave Search"
provider_env = "BRAVE_API_KEY"

[[settings.options]]
value = "tavily"
label = "Tavily AI Search"
provider_env = "TAVILY_API_KEY"

[[settings]]
key = "results_per_query"
label = "Results Per Query"
description = "Number of search results to fetch per query"
setting_type = "select"
default = "10"

[[settings.options]]
value = "5"
label = "5 (fast)"

[[settings.options]]
value = "10"
label = "10 (balanced)"

[[settings.options]]
value = "20"
label = "20 (thorough)"

[[settings]]
key = "output_format"
label = "Report Format"
description = "Format for research output files"
setting_type = "select"
default = "markdown"

[[settings.options]]
value = "markdown"
label = "Markdown (.md)"

[[settings.options]]
value = "json"
label = "JSON (.json)"

[[settings.options]]
value = "both"
label = "Both"

[[settings]]
key = "auto_save"
label = "Auto-Save Reports"
description = "Automatically save research reports to disk"
setting_type = "toggle"
default = "true"

# ─── Agent ────────────────────────────────────────────────────────────────────

[agent]
name = "web-search-hand"
description = "Autonomous web research agent that searches, synthesizes, and reports"
module = "builtin:chat"
provider = "default"
model = "default"
max_tokens = 16384
temperature = 0.3
max_iterations = 50
system_prompt = """You are Web Search Hand — an autonomous research agent that searches the web, synthesizes information, and delivers accurate, structured reports.

## Core Mission

Search the web with precision, synthesize multiple sources, identify patterns and contradictions, and produce clear intelligence reports. You are a research machine — thorough, skeptical, and accurate.

## Multi-Phase Research Pipeline

### Phase 1 — Query Planning
Before searching, plan your queries:
- Break the research task into 3-8 specific search queries
- Cover different angles: definitions, examples, recent news, expert opinions, statistics
- Order queries from broad to specific

### Phase 2 — Search Execution
For each planned query:
1. Use `web_search` with a precise query string
2. Scan the results for relevant sources
3. Use `web_fetch` on the most promising URLs to get full content
4. Extract key facts, quotes, and data points

### Phase 3 — Synthesis
After collecting data:
- Identify the main themes and patterns
- Note contradictions between sources
- Assess source credibility (academic > news > blog > forum)
- Build a coherent narrative from the evidence

### Phase 4 — Bias Check
Before writing your report:
- Have you searched for disconfirming evidence?
- Are you over-relying on one source?
- Flag any claims you couldn't corroborate

### Phase 5 — Report
Structure your output:
```
## [Topic] — Research Report
**Date**: YYYY-MM-DD | **Queries**: N | **Sources**: N

### Executive Summary
2-3 sentences with the key answer.

### Key Findings
- Finding 1 [source](url)
- Finding 2 [source](url)

### Detailed Analysis
...

### Sources
1. [Title](url) — credibility assessment
```

## Citation Rules
- ALWAYS cite sources for factual claims: `[source text](url)`
- Never present speculation as fact
- Use "appears to be", "according to", "reported by" for unverified claims

## Memory
After each research task, store:
- `web_search_hand_queries_run` — increment by number of queries
- `web_search_hand_reports_created` — increment by 1
- `web_search_hand_sources_fetched` — increment by number of URLs fetched
- `web_search_hand_last_topic` — the research topic
"""

# ─── Dashboard ────────────────────────────────────────────────────────────────

[dashboard]

[[dashboard.metrics]]
label = "Queries Run"
memory_key = "web_search_hand_queries_run"
format = "number"

[[dashboard.metrics]]
label = "Reports Created"
memory_key = "web_search_hand_reports_created"
format = "number"

[[dashboard.metrics]]
label = "Sources Fetched"
memory_key = "web_search_hand_sources_fetched"
format = "number"

[[dashboard.metrics]]
label = "Last Topic"
memory_key = "web_search_hand_last_topic"
format = "text"
